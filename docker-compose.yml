version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: recruitment_os_pg
    environment:
      POSTGRES_USER: recruit_admin
      POSTGRES_PASSWORD: secure_password
      POSTGRES_DB: recruitment_os
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: recruitment_os_redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  pgdata:
